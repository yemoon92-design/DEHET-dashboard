<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이딩 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }
  header { background: #1a1d27; padding: 20px 30px; border-bottom: 1px solid #2a2d3a; }
  header h1 { font-size: 22px; color: #fff; }
  header p { font-size: 13px; color: #888; margin-top: 4px; }
  .tabs { display: flex; gap: 4px; padding: 20px 30px 0; background: #1a1d27; }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; background: #252836; color: #888; border: none; }
  .tab.active { background: #0f1117; color: #fff; font-weight: 600; }
  .content { padding: 24px 30px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .summary { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .card { background: #1a1d27; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .card .value { font-size: 24px; font-weight: 700; color: #fff; }
  .card .value.green { color: #4ade80; }
  .card .value.red { color: #f87171; }
  table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 12px; overflow: hidden; }
  th { background: #252836; padding: 12px 16px; text-align: left; font-size: 12px; color: #888; font-weight: 600; }
  td { padding: 12px 16px; font-size: 13px; border-top: 1px solid #252836; }
  tr:hover td { background: #1f2235; }
  .score-bar { display: flex; gap: 2px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.on { background: #4ade80; }
  .dot.off { background: #374151; }
  .pos { color: #4ade80; }
  .neg { color: #f87171; }
  .neu { color: #888; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
  .badge.moon { background: #1e3a5f; color: #60a5fa; }
  .empty { text-align: center; padding: 60px; color: #555; }
  @media(max-width: 600px) { .content { padding: 16px; } th, td { padding: 8px 10px; font-size: 12px; } }
</style>
</head>
<body>

<header>
  <h1>📊 트레이딩 대시보드</h1>
  <p id="updated">데이터 로딩 중...</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="show('coin')">📈 코인 일봉</button>
  <button class="tab" onclick="show('stock')">🏢 주식</button>
  <button class="tab" onclick="show('hourly')">⚡ 1시간봉</button>
  <button class="tab" onclick="show('bounce')">🔄 눌림목 반등</button>
</div>

<div class="content">

  <!-- 코인 일봉 -->
  <div class="panel active" id="panel-coin">
    <div class="summary" id="summary-coin"></div>
    <table><thead><tr>
      <th>날짜</th><th>종목</th><th>점수</th>
      <th>진입가</th><th>1일</th><th>3일</th><th>5일</th>
    </tr></thead><tbody id="body-coin"></tbody></table>
  </div>

  <!-- 주식 -->
  <div class="panel" id="panel-stock">
    <div class="summary" id="summary-stock"></div>
    <table><thead><tr>
      <th>날짜</th><th>종목</th><th>점수</th>
      <th>진입가</th><th>1일</th><th>3일</th><th>5일</th>
    </tr></thead><tbody id="body-stock"></tbody></table>
  </div>

  <!-- 1시간봉 -->
  <div class="panel" id="panel-hourly">
    <div class="summary" id="summary-hourly"></div>
    <table><thead><tr>
      <th>시간</th><th>종목</th><th>점수</th>
      <th>진입가</th><th>1H</th><th>4H</th><th>24H</th><th>시간대</th>
    </tr></thead><tbody id="body-hourly"></tbody></table>
  </div>

  <!-- 눌림목 반등 -->
  <div class="panel" id="panel-bounce">
    <div class="summary" id="summary-bounce"></div>
    <table><thead><tr>
      <th>날짜</th><th>종목</th><th>급등폭</th>
      <th>연속음봉</th><th>알림시 양봉%</th><th>1일</th><th>3일</th><th>5일</th>
    </tr></thead><tbody id="body-bounce"></tbody></table>
  </div>

</div>

<script>
function show(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function pct(v) {
  if (v == null) return '<span class="neu">-</span>';
  const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}

function scoreDots(score, max) {
  let html = '<div style="display:flex;align-items:center;gap:6px">';
  html += '<div class="score-bar">';
  for (let i = 0; i < max; i++)
    html += `<div class="dot ${i < score ? 'on' : 'off'}"></div>`;
  html += '</div>';
  html += `<span style="font-size:12px;color:#4ade80;font-weight:600">${score}/${max}</span>`;
  html += '</div>';
  return html;
}

function winRate(items, field) {
  const valid = items.filter(i => i[field] != null);
  if (!valid.length) return null;
  return (valid.filter(i => i[field] > 0).length / valid.length * 100).toFixed(1);
}

function avgReturn(items, field) {
  const valid = items.filter(i => i[field] != null);
  if (!valid.length) return null;
  return (valid.reduce((s, i) => s + i[field], 0) / valid.length).toFixed(2);
}

function renderSummary(id, items, f1, f2, f3) {
  const el = document.getElementById(id);
  const w1 = winRate(items, f1), w3 = winRate(items, f2), w5 = winRate(items, f3);
  const a1 = avgReturn(items, f1);
  el.innerHTML = `
    <div class="card"><div class="label">총 추천 수</div><div class="value">${items.length}건</div></div>
    <div class="card"><div class="label">1일 승률</div><div class="value ${w1>=50?'green':'red'}">${w1 ?? '-'}%</div></div>
    <div class="card"><div class="label">3일 승률</div><div class="value ${w3>=50?'green':'red'}">${w3 ?? '-'}%</div></div>
    <div class="card"><div class="label">5일 승률</div><div class="value ${w5>=50?'green':'red'}">${w5 ?? '-'}%</div></div>
    <div class="card"><div class="label">평균 수익(1일)</div><div class="value ${a1>=0?'green':'red'}">${a1 ?? '-'}%</div></div>
  `;
}

async function loadCoin() {
  try {
    const d = await fetch('./data/coin_daily.json').then(r => r.json());
    const items = d.recommendations || [];
    renderSummary('summary-coin', items, 'return_1d', 'return_3d', 'return_5d');
    const tbody = document.getElementById('body-coin');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">아직 데이터가 없습니다</td></tr>'; return; }
    tbody.innerHTML = items.slice().reverse().map(i => `<tr>
      <td>${i.date}</td>
      <td><b>${i.ticker.replace('KRW-','')}</b></td>
      <td>${scoreDots(i.score, 10)}</td>
      <td>${i.entry_price?.toLocaleString()}원</td>
      <td>${pct(i.return_1d)}</td>
      <td>${pct(i.return_3d)}</td>
      <td>${pct(i.return_5d)}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('body-coin').innerHTML = '<tr><td colspan="7" class="empty">데이터 없음</td></tr>'; }
}

async function loadStock() {
  try {
    const d = await fetch('./data/stock_daily.json').then(r => r.json());
    const items = d.recommendations || [];
    renderSummary('summary-stock', items, 'return_1d', 'return_3d', 'return_5d');
    const tbody = document.getElementById('body-stock');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">아직 데이터가 없습니다</td></tr>'; return; }
    tbody.innerHTML = items.slice().reverse().map(i => `<tr>
      <td>${i.date}</td>
      <td><b>${i.name}</b> <small style="color:#888">${i.ticker}</small></td>
      <td>${scoreDots(i.score, 10)}</td>
      <td>${i.entry_price?.toLocaleString()}원</td>
      <td>${pct(i.return_1d)}</td>
      <td>${pct(i.return_3d)}</td>
      <td>${pct(i.return_5d)}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('body-stock').innerHTML = '<tr><td colspan="7" class="empty">데이터 없음</td></tr>'; }
}

async function loadHourly() {
  try {
    const d = await fetch('./data/coin_hourly.json').then(r => r.json());
    const items = d.recommendations || [];
    renderSummary('summary-hourly', items, 'return_1h', 'return_4h', 'return_24h');
    const tbody = document.getElementById('body-hourly');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">아직 데이터가 없습니다</td></tr>'; return; }
    tbody.innerHTML = items.slice().reverse().map(i => `<tr>
      <td>${i.datetime}</td>
      <td><b>${i.ticker.replace('KRW-','')}</b></td>
      <td>${scoreDots(i.score, 5)}</td>
      <td>${i.entry_price?.toLocaleString()}원</td>
      <td>${pct(i.return_1h)}</td>
      <td>${pct(i.return_4h)}</td>
      <td>${pct(i.return_24h)}</td>
      <td>${i.is_low_volume ? '<span class="badge moon">🌙 새벽</span>' : ''}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('body-hourly').innerHTML = '<tr><td colspan="8" class="empty">데이터 없음</td></tr>'; }
}

async function loadBounce() {
  try {
    const d = await fetch('./data/coin_bounce.json').then(r => r.json());
    const items = d.recommendations || [];
    const el = document.getElementById('summary-bounce');
    const avgRed = items.length ? (items.reduce((s,i) => s + (i.consecutive_red||0), 0) / items.length).toFixed(1) : '-';
    const avgGain = items.length ? (items.reduce((s,i) => s + (i.gain_pct||0), 0) / items.length).toFixed(1) : '-';
    const w1 = winRate(items, 'return_1d');
    const a1 = avgReturn(items, 'return_1d');
    el.innerHTML = `
      <div class="card"><div class="label">총 추천 수</div><div class="value">${items.length}건</div></div>
      <div class="card"><div class="label">평균 연속음봉</div><div class="value">${avgRed}일</div></div>
      <div class="card"><div class="label">평균 급등폭</div><div class="value green">+${avgGain}%</div></div>
      <div class="card"><div class="label">1일 승률</div><div class="value ${w1>=50?'green':'red'}">${w1 ?? '-'}%</div></div>
      <div class="card"><div class="label">평균 수익(1일)</div><div class="value ${a1>=0?'green':'red'}">${a1 ?? '-'}%</div></div>
    `;
    const tbody = document.getElementById('body-bounce');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">아직 데이터가 없습니다</td></tr>'; return; }
    tbody.innerHTML = items.slice().reverse().map(i => `<tr>
      <td>${i.date}</td>
      <td><b>${i.ticker}</b></td>
      <td><span class="pos">+${i.gain_pct?.toFixed(0)}%</span></td>
      <td>${i.consecutive_red}일</td>
      <td><span class="pos">+${i.rise_pct?.toFixed(1)}%</span></td>
      <td>${pct(i.return_1d)}</td>
      <td>${pct(i.return_3d)}</td>
      <td>${pct(i.return_5d)}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('body-bounce').innerHTML = '<tr><td colspan="8" class="empty">데이터 없음</td></tr>'; }
}

document.getElementById('updated').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
loadCoin(); loadStock(); loadHourly(); loadBounce();
</script>
</body>
</html>
